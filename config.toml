baseURL  =  "https://iwindoors.com"
languageCode = "zh-CN"
# DefaultContentLanguage = "zh-CN"
title  =  "洪窗-专注南昌封窗,换窗服务"
subtitle = "专注南昌及周边住宅封窗、旧窗换新、阳台整装，提供上门测量、方案沟通、安装交付与售后跟进。"
copyright = "© 2026 洪窗｜南昌封窗、换窗、阳台整装服务｜微信：WindoorsY"

theme  =  "hello-friend"
summaryLength = 140
hasCJKLanguage = true
# 每页显示的文章数量用于分页
paginate =  10
# rss 输出数量
rssLimit = 5
timeout = '30s'
ignoreErrors = ["error-remote-getjson","error-remote-getcsv"]

[permalinks]
  posts = "/:filename/"
  tags = "/tags/:slug/"

[menu]
  [[menu.main]]
  name="首页"
  url="/"
  weight="1"
  [[menu.main]]
  name="服务介绍"
  url="/about/"
  weight="2"
  [[menu.main]]
  name="项目记录"
  url="/archives/"
  weight="3"
  [[menu.main]]
  name="搜索"
  url="/search/"
  weight="4"

[params]
  # dir name of your blog content (default is `content/posts`)
  contentTypeName = "posts"
  # "light" or "dark"
  defaultTheme = "dark"
  # if you set this to 0, only submenu trigger will be visible
  showMenuItems = 6
  # Enable to show reading time in minutes for posts
  showReadingTime = false
  logoText = "洪窗"

  MenuMore = "更多"
  DateFormatList = "2006-01-02 15:04:05"
  DateFormatSingle = "2006-01-02 15:04:05"
  ReadMore = "阅读全文"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 1
    
[outputs]
  home = ["Atom", "HTML","JSON"] # <domain>/atom.xml
  page = ["HTML"]
  
[outputFormats.Atom]
  mediatype = "application/rss"
  baseName = "atom"

[params.twikoo]
	enable = true
